<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>MediaFind Settings</title>
<style>
  body {
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: #111827;
    color: #f3f4f6;
    padding: 20px 24px;
    margin: 0;
  }
  h2 { margin: 0 0 8px 0; font-size: 15px; }
  p.hint { font-size: 12px; color: #9ca3af; line-height: 1.4; margin-bottom: 14px; }
  input {
    width: 100%;
    padding: 9px 10px;
    border-radius: 6px;
    border: 1px solid #374151;
    background: #1f2937;
    color: #fff;
    box-sizing: border-box;
    margin-bottom: 14px;
    font-size: 13px;
  }
  .row { display: flex; justify-content: flex-end; gap: 8px; }
  button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: #2563eb;
    color: #fff;
    cursor: pointer;
    font-size: 13px;
  }
  button.secondary { background: #374151; }
</style>
</head>
<body>
  <h2>Gemini API Key</h2>
  <p class="hint">
    Used for AI-powered photo search and face recognition. Leave blank to run
    in demo mode with sample data. The app will restart after saving.
  </p>
  <input id="key" type="password" placeholder="Paste your Gemini API key" autofocus />
  <div class="row">
    <button id="cancel" class="secondary">Cancel</button>
    <button id="save">Save</button>
  </div>

  <script>
    const { ipcRenderer } = require('electron');

    ipcRenderer.invoke('get-api-key').then((key) => {
      if (key) document.getElementById('key').value = key;
    });

    document.getElementById('save').addEventListener('click', async () => {
      const value = document.getElementById('key').value.trim();
      await ipcRenderer.invoke('set-api-key', value);
      window.close();
    });

    document.getElementById('cancel').addEventListener('click', () => window.close());
  </script>
</body>
</html>
